<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Padel Scoreboard</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#000;
  overflow:hidden;
}

.topbar{
  position:fixed;
  top:0;
  width:100%;
  background:#111;
  color:white;
  padding:8px;
  font-size:14px;
  z-index:10;
}

.scoreboard{
  display:flex;
  flex-direction:row;
  height:100vh;
}

.team{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
}

.teamA{
  background:black;
  color:white;
}

.teamB{
  background:white;
  color:black;
}

.score{
  font-size:45vw;
  font-weight:bold;
  line-height:1;
}

button{
  padding:6px 12px;
  margin:5px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.panel{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#222;
  padding:20px;
  width:90%;
  max-width:400px;
  border-radius:10px;
  transition:0.3s;
  color:white;
}

.panel.minimized{
  top:auto;
  bottom:0;
  left:0;
  transform:none;
  width:100%;
  height:40px;
  border-radius:0;
  padding:5px 10px;
  display:flex;
  align-items:center;
  font-size:14px;
}

textarea{
  width:100%;
  height:100px;
}

#endOverlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  color:white;
  display:none;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  font-size:10vw;
  font-weight:bold;
  z-index:999;
  text-align:center;
}
</style>
</head>

<body>

<div class="topbar">
Mode:
<select id="mode">
<option value="tennis">Tennis 15-30-40</option>
<option value="americano">Americano 21</option>
</select>
<button onclick="resetScore()">Reset</button>
<button onclick="handleGenerate()">Generate</button>
</div>

<div class="scoreboard">
  <div class="team teamA" onclick="addScore('A')">
    <div class="score" id="scoreA">0</div>
  </div>
  <div class="team teamB" onclick="addScore('B')">
    <div class="score" id="scoreB">0</div>
  </div>
</div>

<div class="panel minimized" id="panel">
  <div id="panelContent" style="display:none;">
    <h3>Generate Americano</h3>
    <textarea id="players" placeholder="1 nama per baris"></textarea>
    <button onclick="generate()">Generate</button>
  </div>
  <div id="miniInfo">Ready</div>
</div>

<div id="endOverlay">
  END MATCH
  <div style="margin-top:20px;font-size:5vw;">
    <button onclick="nextMatch()">Next Match</button>
    <button onclick="goHome()">Home</button>
  </div>
</div>

<script>

let scoreA=0;
let scoreB=0;
let matches=[];
let currentMatchIndex=0;
let matchEnded=false;

/* ================= SCORE ================= */

function addScore(team){
  if(matchEnded) return;

  let mode=document.getElementById("mode").value;

  if(mode==="tennis"){
    let points=[0,15,30,40];

    if(team==="A"){
      if(scoreA===40){ endMatch(); return; }
      scoreA=points[Math.min(points.indexOf(scoreA)+1,3)];
    }else{
      if(scoreB===40){ endMatch(); return; }
      scoreB=points[Math.min(points.indexOf(scoreB)+1,3)];
    }

  }else{
    if(team==="A") scoreA++;
    else scoreB++;

    if(scoreA + scoreB === 21){
      endMatch();
    }
  }

  updateScore();
}

function updateScore(){
  document.getElementById("scoreA").innerText=scoreA;
  document.getElementById("scoreB").innerText=scoreB;
}

function resetScore(){
  scoreA=0;
  scoreB=0;
  matchEnded=false;
  updateScore();
  document.getElementById("endOverlay").style.display="none";
}

/* ================= MATCH SYSTEM ================= */

function generate(){
  let players=document.getElementById("players").value
  .split("\n")
  .map(p=>p.trim())
  .filter(p=>p!="");

  if(players.length<4){
    alert("Minimal 4 player");
    return;
  }

  matches=[];

  for(let i=0;i<players.length;i++){
    for(let j=i+1;j<players.length;j++){
      for(let k=j+1;k<players.length;k++){
        for(let l=k+1;l<players.length;l++){
          matches.push(`${players[i]}&${players[j]} vs ${players[k]}&${players[l]}`);
        }
      }
    }
  }

  currentMatchIndex=0;
  loadMatch();
  minimize();
}

function handleGenerate(){

  let players = document.getElementById("players").value
    .split("\n")
    .map(p=>p.trim())
    .filter(p=>p!="");

  if(players.length < 4){
    expand();   // buka panel supaya user isi dulu
    return;
  }

  generate();   // langsung generate kalau sudah cukup
}
  
function loadMatch(){
  if(matches.length===0) return;

  document.getElementById("miniInfo").innerText=
  `Match ${currentMatchIndex+1}/${matches.length} | ${matches[currentMatchIndex]}`;

  resetScore();
}

function nextMatch(){
  currentMatchIndex++;

  if(currentMatchIndex>=matches.length){
    goHome();
    return;
  }

  document.getElementById("endOverlay").style.display="none";
  matchEnded=false;
  loadMatch();
}

function goHome(){
  document.getElementById("endOverlay").style.display="none";
  matchEnded=false;
  currentMatchIndex=0;
  resetScore();
  document.getElementById("miniInfo").innerText="Ready";
}

/* ================= OVERLAY ================= */

function endMatch(){
  matchEnded=true;
  document.getElementById("endOverlay").style.display="flex";
}

/* ================= PANEL ================= */

function minimize(){
  let panel=document.getElementById("panel");
  panel.classList.add("minimized");
  document.getElementById("panelContent").style.display="none";
}

function expand(){
  let panel=document.getElementById("panel");
  panel.classList.remove("minimized");
  document.getElementById("panelContent").style.display="block";
}

document.addEventListener("click",function(e){
  let panel=document.getElementById("panel");
  if(!panel.classList.contains("minimized") && !panel.contains(e.target)){
    minimize();
  }
});

</script>

</body>
</html>
