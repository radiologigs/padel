<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Padel Scoreboard</title>

<style>
body { margin: 0; padding: 0; font-family: Arial, sans-serif; background: #000; overflow: hidden; color: white; }

.topbar {
  position: fixed; top: 0; width: 100%; height: 50px;
  background: #111; border-bottom: 1px solid #333;
  display: flex; justify-content: space-between; align-items: center;
  padding: 0 15px; z-index: 100; box-sizing: border-box;
}

.controls { display: flex; align-items: center; gap: 8px; }

.controls select {
  background: #333; color: white; border: none; padding: 5px; 
  border-radius: 4px; font-size: 12px; cursor: pointer;
}

#miniInfo {
  font-weight: bold; color: #fff;
  font-family: Arial, sans-serif;
  background: #222; padding: 5px 12px; border-radius: 4px;
  font-size: 13px; white-space: nowrap;
}

.scoreboard {
  display: flex; width: 100vw; height: 100vh;
  position: absolute; top: 0; left: 0; padding-top: 50px;
  box-sizing: border-box;
}

.team { flex: 1; width: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; }
.teamA { background: black; color: white; }
.teamB { background: white; color: black; }
.score { font-size: 35vw; font-weight: bold; user-select: none; text-align: center; line-height: 0.8; margin-top: -2vh; }

button { padding: 6px 12px; border: none; border-radius: 6px; cursor: pointer; background: #444; color: white; font-size: 12px; }
button:active { background: #666; }

.panel {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  background: #222; padding: 20px; width: 90%; max-width: 500px;
  border-radius: 12px; z-index: 1000; border: 1px solid #444; box-shadow: 0 0 30px rgba(0,0,0,0.8);
}

#endOverlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.95); display: none; flex-direction: column; 
  justify-content: center; align-items: center; z-index: 9999;
}
</style>
</head>

<body>

<div class="topbar">
  <div class="controls">
    <select id="mode" onchange="saveData()">
      <option value="tennis">15-30-40</option>
      <option value="americano">21 Points</option>
    </select>

    <select id="matchLimit">
      <option value="8">8 M</option>
      <option value="9">9 M</option>
      <option value="10">10 M</option>
      <option value="11">11 M</option>
      <option value="12" selected>12 M</option>
      <option value="13">13 M</option>
      <option value="14">14 M</option>
      <option value="15">15 M</option>
      <option value="16">16 M</option>
    </select>

    <button onclick="resetScore()">Reset</button>
    <button onclick="handleGenerate(event)" style="background: #28a745;">Generate</button>
    <button onclick="showLeaderboard()" style="background: #6f42c1;">Leaderboard</button>
    <button onclick="toggleFullscreen()" style="background: #555;">Full Screen</button> </div>
  <div id="miniInfo">Ready</div> </div>

<div class="scoreboard">
  <div class="team teamA" onclick="addScore('A')"><div class="score" id="scoreA">0</div></div>
  <div class="team teamB" onclick="addScore('B')"><div class="score" id="scoreB">0</div></div>
</div>

<div class="panel" id="leaderboardPanel" style="display:none; max-width:600px;">
    <h3 style="margin:0 0 10px 0; text-align:center; color:#ffaa00;">STANDINGS</h3>
    
    <div style="display:flex; gap:5px; margin-bottom:15px; justify-content:center;">
        <button onclick="renderLeaderboard('points')" style="background:#333; flex:1; padding:8px; font-size:11px;">SORT BY PTS</button>
        <button onclick="renderLeaderboard('wins')" style="background:#333; flex:1; padding:8px; font-size:11px;">SORT BY WIN</button>
    </div>

    <div style="max-height: 350px; overflow-y: auto;">
      <table id="leaderboardTable" style="width:100%; border-collapse:collapse; font-size:14px;"></table>
    </div>
    <button onclick="hideLeaderboard()" style="background:#444; width:100%; padding:12px; margin-top:15px; border-radius:6px; font-weight:bold;">CLOSE</button>
</div>

<div id="endOverlay">
  <h1 style="font-size: 10vw; margin-bottom: 30px;">MATCH END</h1>
  <button onclick="nextMatch()" style="background:#007bff; padding:15px 40px; font-size:24px; color:white; border:none; border-radius:10px; cursor:pointer;">Next Match</button>
</div>

<div class="panel" id="panel" style="display:none;">
    <h3 style="margin-top:0;">Setup Player</h3>
    <textarea id="players" style="width:100%; height:120px; background:#333; color:white; border:1px solid #555; padding:8px; box-sizing:border-box;" placeholder="Nama per baris..."></textarea>
    <button onclick="generate()" style="background:#28a745; width:100%; padding:10px; margin-top:10px; font-weight:bold;">START MATCH</button>
    <button onclick="hidePanel()" style="background:transparent; width:100%; margin-top:5px; color:#888;">Cancel</button>
</div>

<script>
let scoreA=0, scoreB=0, matches=[], currentMatchIndex=0, matchEnded=false, playerStats={};

function announce(text) {
  if ('speechSynthesis' in window) {
    let msg = new SpeechSynthesisUtterance(text);
    msg.lang = 'en-US'; msg.rate = 0.9;
    window.speechSynthesis.speak(msg);
  }
}

function addScore(team){
  if(matchEnded) return;
  let mode = document.getElementById("mode").value;
  if(mode === "tennis"){
    let p = [0, 15, 30, 40];
    if(team === "A"){
      if(scoreA === 40){ announce("Game Point Team A"); endMatch(); return; }
      scoreA = p[Math.min(p.indexOf(scoreA) + 1, 3)];
      if(scoreA === 40 && scoreB < 40) announce("Match Point Team A");
    } else {
      if(scoreB === 40){ announce("Game Point Team B"); endMatch(); return; }
      scoreB = p[Math.min(p.indexOf(scoreB) + 1, 3)];
      if(scoreB === 40 && scoreA < 40) announce("Match Point Team B");
    }
  } else {
    if(team === "A") scoreA++; else scoreB++;
    if(scoreA + scoreB === 21) { announce("Match Over"); endMatch(); return; }
    if(scoreA + scoreB === 20) announce("Match Point");
  }
  updateScore();
  setTimeout(() => {
    let vA = scoreA === 0 ? "Love" : scoreA;
    let vB = scoreB === 0 ? "Love" : scoreB;
    if(mode === "tennis" && scoreA === scoreB && scoreA !== 0) announce(scoreA === 40 ? "Deuce" : vA + " All");
    else announce(vA + " " + vB);
  }, 1000);
  saveData();
}

function generate() {
  let p = document.getElementById("players").value.split("\n").map(n => n.trim()).filter(n => n != "");
  let limit = parseInt(document.getElementById("matchLimit").value);
  
  if (p.length < 4) { alert("Min 4 players!"); return; }

  // 1. Reset Stats
  playerStats = {};
  p.forEach(n => playerStats[n] = { wins: 0, losses: 0, points: 0, matches: 0, playCount: 0 });

  let generatedMatches = [];
  
  // 2. Loop sebanyak limit (misal 12 kali)
  for (let m = 0; m < limit; m++) {
    // Sort pemain berdasarkan jumlah main paling dikit (playCount)
    let sortedByPlay = [...p].sort((a, b) => playerStats[a].playCount - playerStats[b].playCount);
    
    // Ambil 4 orang yang paling jarang main
    let candidates = sortedByPlay.slice(0, 6); // Ambil 6 calon buat diacak biar gak monoton
    candidates.sort(() => Math.random() - 0.5);
    
    let p1 = candidates[0];
    let p2 = candidates[1];
    let p3 = candidates[2];
    let p4 = candidates[3];

    // Update playCount sementara buat keperluan loop ini
    playerStats[p1].playCount++;
    playerStats[p2].playCount++;
    playerStats[p3].playCount++;
    playerStats[p4].playCount++;

    // Gabungin jadi format match
    let t1 = [p1, p2].sort().join(" & ");
    let t2 = [p3, p4].sort().join(" & ");
    generatedMatches.push(`${t1} vs ${t2}`);
  }

  // 3. Finalisasi
  matches = generatedMatches;
  currentMatchIndex = 0;
  
  // Reset playCount beneran buat statistik leaderboard nanti
  p.forEach(n => playerStats[n].playCount = 0);
  
  loadMatch();
  hidePanel();
  saveData();
}

function updateScore(){ document.getElementById("scoreA").innerText=scoreA; document.getElementById("scoreB").innerText=scoreB; }
function endMatch(){ matchEnded = true; updateStats(); document.getElementById("endOverlay").style.display = "flex"; saveData(); }
function resetScore(){ scoreA=0; scoreB=0; matchEnded=false; updateScore(); document.getElementById("endOverlay").style.display="none"; saveData(); }

function updateStats(){
  if(!matches[currentMatchIndex]) return;
  let mode = document.getElementById("mode").value;
  let t = matches[currentMatchIndex].split(" vs "), tA = t[0].split(" & "), tB = t[1].split(" & ");
  [...tA, ...tB].forEach(n => playerStats[n].matches++);
  if(mode === "tennis") {
    if(scoreA > scoreB) { tA.forEach(n => { playerStats[n].wins++; playerStats[n].points += 1; }); tB.forEach(n => playerStats[n].losses++); }
    else { tB.forEach(n => { playerStats[n].wins++; playerStats[n].points += 1; }); tA.forEach(n => playerStats[n].losses++); }
  } else {
    tA.forEach(n => { playerStats[n].points += scoreA; if(scoreA > scoreB) playerStats[n].wins++; else playerStats[n].losses++; });
    tB.forEach(n => { playerStats[n].points += scoreB; if(scoreB > scoreA) playerStats[n].wins++; else playerStats[n].losses++; });
  }
}

function nextMatch() {
  currentMatchIndex++;
  if (currentMatchIndex >= matches.length) {
    showLeaderboard();
    
    matches = []; 
    currentMatchIndex = 0;
    document.getElementById("miniInfo").innerText = "Ready";
    document.getElementById("endOverlay").style.display = "none";
    
    localStorage.removeItem('padelData'); 
    return;
  }
  loadMatch();
}

function loadMatch(){
  if(!matches || matches.length === 0 || !matches[currentMatchIndex]) {
    document.getElementById("miniInfo").innerText = "Ready";
    return;
  }
  document.getElementById("miniInfo").innerHTML = `<span>${matches[currentMatchIndex]}</span> | <span style="color:#fa0">M${currentMatchIndex+1}/${matches.length}</span>`;
  resetScore();
}

function toggleFullscreen() { if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }
function handleGenerate(e){ e.stopPropagation(); document.getElementById("panel").style.display="block"; }
function hidePanel(){ document.getElementById("panel").style.display="none"; }
function showLeaderboard() {
  renderLeaderboard();
  document.getElementById("leaderboardPanel").style.display = "block";
}

function hideLeaderboard() {
  document.getElementById("leaderboardPanel").style.display = "none";
}

function renderLeaderboard(sortKey = 'points') {
  // 1. Ambil data playerStats
  let arr = Object.keys(playerStats).map(n => ({ name: n, ...playerStats[n] }));
  
  // 2. LOGIKA SORTIR: Urutkan berdasarkan parameter yang diklik
  arr.sort((a, b) => b[sortKey] - a[sortKey]);

  let html = `
    <tr style="color:#888; font-size:10px; text-transform:uppercase;">
      <th style="text-align:left; padding:10px;">Player</th>
      <th>M</th><th>W</th><th>L</th><th>Pts</th>
    </tr>`;

  arr.forEach(p => {
    html += `
      <tr style="border-bottom:1px solid #333;">
        <td style="text-align:left; padding:12px 10px; font-weight:bold; font-size:13px;">${p.name}</td>
        <td style="text-align:center;">${p.matches}</td>
        <td style="text-align:center; color:#0f0;">${p.wins}</td>
        <td style="text-align:center; color:#f44;">${p.losses}</td>
        <td style="text-align:center; color:#fa0; font-weight:bold;">${p.points}</td>
      </tr>`;
  });

  document.getElementById("leaderboardTable").innerHTML = html;
}

function saveData(){ localStorage.setItem('padelData', JSON.stringify({scoreA, scoreB, matches, currentMatchIndex, matchEnded, playerStats, mode: document.getElementById("mode").value})); }
function loadData() {
  const saved = localStorage.getItem('padelData');
  
  // Jika tidak ada data tersimpan, atau datanya kosong, tampilkan Ready
  if (!saved) {
    document.getElementById("miniInfo").innerText = "Ready";
    return;
  }
  
  const d = JSON.parse(saved);
  
  // Cek apakah turnamen sudah di-generate atau belum
  if (!d.matches || d.matches.length === 0) {
    document.getElementById("miniInfo").innerText = "Ready";
    // Tetap reset score ke 0 biar sinkron
    scoreA = 0; scoreB = 0;
    updateScore();
  } else {
    // Jika ada turnamen aktif, baru tampilkan nama pemain
    scoreA = d.scoreA; 
    scoreB = d.scoreB; 
    matches = d.matches; 
    currentMatchIndex = d.currentMatchIndex; 
    playerStats = d.playerStats;
    document.getElementById("mode").value = d.mode;
    
    updateScore();
    document.getElementById("miniInfo").innerHTML = `<span>${matches[currentMatchIndex]}</span> | <span style="color:#fa0">M${currentMatchIndex+1}/${matches.length}</span>`;
    
    if (d.matchEnded) {
       document.getElementById("endOverlay").style.display = "flex";
    }
  }
}
window.onload = loadData;
</script>
</body>
</html>
