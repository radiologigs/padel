<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Padel Scoreboard</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#111;
  color:white;
  text-align:center;
}

.scoreboard{
  display:flex;
  height:60vh;
}

.team{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.teamA{
  background:black;
  color:white;
}

.teamB{
  background:white;
  color:black;
}

.score{
  font-size:80px;
  font-weight:bold;
}

button{
  padding:10px 15px;
  margin:5px;
  font-size:16px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.controls{
  padding:10px;
}

.panel{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#222;
  padding:20px;
  border-radius:10px;
  width:90%;
  max-width:400px;
  transition:0.3s;
}

.panel.minimized{
  top:auto;
  bottom:0;
  left:0;
  transform:none;
  width:100%;
  height:50px;
  overflow:hidden;
  border-radius:0;
  display:flex;
  align-items:center;
  justify-content:center;
}

textarea{
  width:100%;
  height:100px;
}

.match-row{
  display:flex;
  justify-content:center;
  margin:5px 0;
}

input[type=number]{
  width:50px;
}

.standing{
  margin-top:10px;
  font-size:14px;
  max-height:150px;
  overflow:auto;
}
</style>
</head>

<body>

<div class="scoreboard">
  <div class="team teamA">
    <div>Team A</div>
    <div class="score" id="scoreA">0</div>
    <button onclick="addScore('A')">+</button>
  </div>
  <div class="team teamB">
    <div>Team B</div>
    <div class="score" id="scoreB">0</div>
    <button onclick="addScore('B')">+</button>
  </div>
</div>

<div class="controls">
  Mode:
  <select id="mode">
    <option value="tennis">Tennis 15-30-40</option>
    <option value="americano">Americano 21</option>
  </select>
  <button onclick="resetScore()">Reset</button>
</div>

<div class="panel" id="panel">

  <div id="panelContent">
    <h3>Generate Americano</h3>
    <textarea id="players" placeholder="Input nama player (1 per baris)"></textarea>
    <br>
    <button onclick="generate()">Generate</button>

    <div id="matches"></div>

    <div class="standing" id="standing"></div>
  </div>

  <div id="miniInfo" style="display:none;"></div>

</div>

<script>

let scoreA=0;
let scoreB=0;
let matches=[];
let players=[];
let standings={};
let currentMatchIndex=0;

function addScore(team){
  let mode=document.getElementById("mode").value;

  if(mode==="tennis"){
    let points=[0,15,30,40];
    if(team==="A"){
      scoreA=points[Math.min(points.indexOf(scoreA)+1,3)];
    }else{
      scoreB=points[Math.min(points.indexOf(scoreB)+1,3)];
    }
  }else{
    if(team==="A") scoreA++;
    else scoreB++;
  }

  updateScore();
}

function updateScore(){
  document.getElementById("scoreA").innerText=scoreA;
  document.getElementById("scoreB").innerText=scoreB;
}

function resetScore(){
  scoreA=0;
  scoreB=0;
  updateScore();
}

function generate(){
  players=document.getElementById("players").value
          .split("\n")
          .map(p=>p.trim())
          .filter(p=>p!=="");

  if(players.length<4){
    alert("Minimal 4 player");
    return;
  }

  matches=[];
  standings={};

  players.forEach(p=>{
    standings[p]={win:0,point:0,against:0,match:0};
  });

  for(let i=0;i<players.length;i++){
    for(let j=i+1;j<players.length;j++){
      for(let k=j+1;k<players.length;k++){
        for(let l=k+1;l<players.length;l++){
          matches.push([[players[i],players[j]],[players[k],players[l]]]);
        }
      }
    }
  }

  renderMatches();
  minimize();
}

function renderMatches(){
  let container=document.getElementById("matches");
  container.innerHTML="";

  matches.forEach((m,index)=>{
    let div=document.createElement("div");
    div.className="match-row";
    div.innerHTML=`
      ${m[0][0]}&${m[0][1]} vs ${m[1][0]}&${m[1][1]}
      <input type="number" id="a${index}">
      -
      <input type="number" id="b${index}">
      <button onclick="saveMatch(${index})">OK</button>
    `;
    container.appendChild(div);
  });
}

function saveMatch(i){
  let a=parseInt(document.getElementById("a"+i).value);
  let b=parseInt(document.getElementById("b"+i).value);

  if(isNaN(a)||isNaN(b)) return;

  let m=matches[i];

  m[0].forEach(p=>{
    standings[p].point+=a;
    standings[p].against+=b;
    standings[p].match++;
  });

  m[1].forEach(p=>{
    standings[p].point+=b;
    standings[p].against+=a;
    standings[p].match++;
  });

  if(a>b) m[0].forEach(p=>standings[p].win++);
  else m[1].forEach(p=>standings[p].win++);

  renderStanding();
  updateMiniInfo(i,a,b);
}

function renderStanding(){
  let s=document.getElementById("standing");
  let arr=Object.entries(standings);

  arr.sort((a,b)=>{
    if(b[1].win!==a[1].win)
      return b[1].win-a[1].win;
    return (b[1].point-b[1].against)-
           (a[1].point-a[1].against);
  });

  s.innerHTML="<h4>Standing</h4>";
  arr.forEach(p=>{
    s.innerHTML+=`
      ${p[0]} |
      Win:${p[1].win} |
      P:${p[1].point} |
      Diff:${p[1].point-p[1].against} |
      Match:${p[1].match}
      <br>
    `;
  });
}

function updateMiniInfo(i,a,b){
  let m=matches[i];
  document.getElementById("miniInfo").innerHTML=
    `Match ${i+1}/${matches.length} |
     ${m[0][0]}&${m[0][1]} vs ${m[1][0]}&${m[1][1]}
     | ${a}-${b}`;
}

function minimize(){
  let panel=document.getElementById("panel");
  panel.classList.add("minimized");
  document.getElementById("panelContent").style.display="none";
  document.getElementById("miniInfo").style.display="block";
}

function expand(){
  let panel=document.getElementById("panel");
  panel.classList.remove("minimized");
  document.getElementById("panelContent").style.display="block";
  document.getElementById("miniInfo").style.display="none";
}

document.getElementById("panel").addEventListener("click",function(e){
  if(this.classList.contains("minimized")){
    expand();
  }
});

document.addEventListener("click",function(e){
  let panel=document.getElementById("panel");
  if(!panel.contains(e.target) && !panel.classList.contains("minimized")){
    minimize();
  }
});

</script>

</body>
</html>
